<!DOCTYPE html>
<!-- 声明这是一个 HTML5 文档，告诉浏览器用标准模式解析网页 -->

<!-- html 是整个网页的根标签；lang="zh-CN" 表示网页主要语言是简体中文 -->
<html lang="zh-CN"> 

<!-- head 里放的是“给浏览器看的信息”，不是页面上直接显示的内容 -->
<head>
  <!-- 指定网页使用 UTF-8 编码，这样中文通常不会乱码 -->
  <meta charset="UTF-8">

  <!-- title 是网页标题，会显示在浏览器标签页上 -->
  <title>第二课：盒模型练习</title>

  <!-- style 里面写 CSS，用来控制网页长什么样 -->
  <style>
    /* 选中 body，也就是整个页面主体区域 */
    body {
      background-color: black; /* 把页面背景颜色设置成黑色 */
      color: white;            /* 把页面默认文字颜色设置成白色 */
      margin: 50px;            /* 让整个页面内容和浏览器边缘保持 50px 距离 */
    }

    /* 选中 nav，也就是导航菜单这个盒子 */
    nav {
      border: 1px solid #B5E38C;   /* 给 nav 加 1 像素的浅绿色实线边框 */
      border-radius: 50px;         /* 把边角变圆，数值大时会更像“药丸”形状 */
      padding-top: 10px;           /* 上内边距：文字和上边框之间留 10px 空间 */
      padding-bottom: 10px;        /* 下内边距：文字和下边框之间留 10px 空间 */
      padding-left: 20px;          /* 左内边距：文字和左边框之间留 20px 空间 */
      padding-right: 0px;         /* 右内边距：文字和右边框之间留 0px 空间 */
      margin-bottom: 40px;         /* 下外边距：让 nav 和下面元素之间隔开 40px */
      display: inline-block;       /* 让 nav 宽度跟着内容走，而不是默认占满一整行 */
    }

    /* 选中 nav 里面所有的 a 标签，也就是导航链接文字 */
    nav a {
      color: #ffffff;              /* 把链接文字颜色设置成粉色 */
      text-decoration: none;       /* 去掉链接默认的下划线 */
      margin-right: 20px;          /* 每个链接右边加 20px 间距，避免挤在一起 */
    }
  </style>
</head>

<!-- body 里放的是网页上真正会显示出来的内容 -->
<body>

  <!-- header 表示页头区域，通常会放网站标题、logo、导航等 -->
  <header>
    <!-- nav 表示导航区域，里面通常放页面跳转链接 -->
    <nav>
      <!-- a 是超链接标签；href="#" 目前只是占位，点击后不会跳转到真正页面 -->
      <a href="#">About</a>
      <!-- 第二个导航链接，显示文字是 Works -->
      <a href="#">Works</a>
      <!-- 第三个导航链接，显示文字是 Contact -->
      <a href="#">Contact</a>
    </nav>
  </header>

</body>

<!-- /html 表示整个 HTML 文档结束 -->
</html>
